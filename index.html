<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Top-up Store</title>
<style>
body{
  font-family:'Segoe UI',Arial,sans-serif;
  color:#fff;
  min-height:100vh;
  padding:20px;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
              url('https://images.unsplash.com/photo-1618005182384-a83a8bd57da3?q=80&w=1920') no-repeat center fixed !important;
  background-size: cover !important;
}

.container{
  max-width: 600px;
  margin: auto;
}

h1, h2{
  text-align: center;
  margin-bottom: 10px;
}

.sub-text{
  text-align: center;
  font-size: 15px;
  margin-bottom: 20px;
  color: #ddd;
}

.diamond-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.diamond-box {
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid #ff6b00;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(5px);
}

.diamond-box:hover {
  background: rgba(255, 107, 0, 0.3);
  transform: scale(1.05);
}

.diamonds {
  font-size: 20px;
  font-weight: bold;
  color: #00d4ff;
  margin-bottom: 5px;
}

.price {
  font-size: 18px;
  color: #fff;
  font-weight: bold;
}

#orderForm{
  display: none;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 2px solid #ff6b00;
}

#orderForm input{
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  box-sizing: border-box;
}

#orderForm button{
  width: 100%;
  padding: 12px;
  background: #ff6b00;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

#orderForm button:hover{
  background: #e55f00;
}

.close-btn{
  background: #ff0000 !important;
  margin-top: 5px;
}

@media(max-width: 500px){
  .diamond-grid{
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>🔥 FF Top-up Store</h1>
  
  <h2>💎 UID Top-up</h2>
  <p class="sub-text">ডায়মন্ড, মেম্বারশিপ, ইভো কিনো সস্তায়</p>
  
  <h2>Diamond Packages</h2>
  <p class="sub-text">💎 আপনার পছন্দের প্যাকেজে ট্যাপ করুন</p>

  <div class="diamond-grid">
    
    <div class="diamond-box" onclick="selectPackage('100 Diamond', '65')">
      <div class="diamonds">💎 100</div>
      <div class="price">৳65</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('355 Diamond', '215')">
      <div class="diamonds">💎 355</div>
      <div class="price">৳215</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('505 Diamond', '310')">
      <div class="diamonds">💎 505</div>
      <div class="price">৳310</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('725 Diamond', '458')">
      <div class="diamonds">💎 725</div>
      <div class="price">৳458</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('1090 Diamond', '695')">
      <div class="diamonds">💎 1090</div>
      <div class="price">৳695</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('1480 Diamond', '920')">
      <div class="diamonds">💎 1480</div>
      <div class="price">৳920</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('2090 Diamond', '1310')">
      <div class="diamonds">💎 2090</div>
      <div class="price">৳1310</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('2500 Diamond', '1550')">
      <div class="diamonds">💎 2500</div>
      <div class="price">৳1550</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('3010 Diamond', '1885')">
      <div class="diamonds">💎 3010</div>
      <div class="price">৳1885</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('5060 Diamond', '3145')">
      <div class="diamonds">💎 5060</div>
      <div class="price">৳3145</div>
    </div>

    <div class="diamond-box" onclick="selectPackage('10000 Diamond', '6100')">
      <div class="diamonds">💎 10000</div>
      <div class="price">৳6100</div>
    </div>

  </div>

  <!-- Order Form -->
  <div id="orderForm">
    <h3 id="selectedPackage">Package</h3>
    <input type="text" id="uid" placeholder="Free Fire UID লিখুন" required>
    <input type="text" id="playerName" placeholder="Player Name লিখুন" required>
    <button onclick="sendOrder()">Order Confirm করুন</button>
    <button class="close-btn" onclick="closeForm()">Cancel</button>
  </div>
</div>

<script>
let selectedDiamond = "";
let selectedPrice = "";
let whatsapp = "601129263580"; // তোমার WhatsApp নাম্বার

function selectPackage(diamonds, price){
  selectedDiamond = diamonds;
  selectedPrice = price;
  document.getElementById('selectedPackage').innerText = diamonds + " - ৳" + price;
  document.getElementById('orderForm').style.display = 'block';
  window.scrollTo(0, document.body.scrollHeight);
}

function closeForm(){
  document.getElementById('orderForm').style.display = 'none';
  document.getElementById('uid').value = '';
  document.getElementById('playerName').value = '';
}

function sendOrder(){
  let uid = document.getElementById('uid').value;
  let playerName = document.getElementById('playerName').value;
  
  if(uid == "" || playerName == ""){
    alert("UID এবং Player Name দুইটাই লিখুন!");
    return;
  }
  
  let msg = `🔥 নতুন অর্ডার 🔥\n\nPackage: ${selectedDiamond}\nPrice: ৳${selectedPrice}\nUID: ${uid}\nPlayer Name: ${playerName}`;
  
  alert("অর্ডার কনফার্ম হচ্ছে... WhatsApp এ নিয়ে যাচ্ছি!");
  
  setTimeout(() => {
    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
    closeForm();
  }, 1500);
}
</script>

</body>
</html>
